name: Duitwise
description: A gamified financial literacy application for kids.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.6.0
  http: ^1.2.0
  video_player: ^2.11.1
  image_picker: ^1.1.2
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  intl: ^0.19.0
  pdf: ^3.10.8
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
  

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/saving_video.mp4
    - assets/needs_video.mp4
    - assets/account_video.mp4
    - assets/intro_video.mp4